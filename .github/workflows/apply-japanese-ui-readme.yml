name: Apply Japanese UI README update

on:
  push:
    branches:
      - agent/japanese-ui-copy
    paths:
      - .github/workflows/apply-japanese-ui-readme.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/japanese-ui-copy
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README links and Japanese UI section
        shell: python
        run: |
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '- [現在の制約と未完了項目](#現在の制約と未完了項目)\n- [設計資料](#設計資料)',
              '- [現在の制約と未完了項目](#現在の制約と未完了項目)\n- [日本語UI文言](#日本語ui文言)\n- [設計資料](#設計資料)'
          )
          section = '''## 日本語UI文言

          Electron画面、通知、事前検査、ファイルダイアログ、利用者向けエラーでは、正確さを優先した専門的な日本語を使用します。共通文言は`src/shared/presentation/ja/`で管理し、利用者向けの英語装飾見出しや、生のOS・Node.js例外文を通常画面へ表示しません。

          文言変更では、型検査、Vitest、サンプル検証、本番ビルドに加え、Windows 11上でキーボード操作と100%、150%、200%の表示倍率を確認します。手動確認が未実施の項目は、視覚的な受入完了として扱いません。

          - [日本語UI文言設計](docs/superpowers/specs/2026-07-16-electron-japanese-ui-copy-design.md)
          - [日本語UI文言の手動確認チェックリスト](docs/testing/electron-japanese-ui-copy-checklist.md)

          '''
          if '## 日本語UI文言\n' not in text:
              text = text.replace('## MVP対象外\n', section + '## MVP対象外\n')
          text = text.replace(
              '- [Electron移行ステータス](docs/implementation/2026-07-15-electron-replatform-status.md)\n',
              '- [Electron移行ステータス](docs/implementation/2026-07-15-electron-replatform-status.md)\n'
              '- [日本語UI文言設計](docs/superpowers/specs/2026-07-16-electron-japanese-ui-copy-design.md)\n'
              '- [日本語UI文言実装ステータス](docs/implementation/2026-07-16-japanese-ui-copy-status.md)\n'
          )
          path.write_text(text, encoding='utf-8', newline='\n')
          Path('.github/workflows/apply-japanese-ui-readme.yml').unlink()

      - name: Commit README update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'checklistmaker-agent'
          git config user.email 'checklistmaker-agent@users.noreply.github.com'
          git add README.md .github/workflows/apply-japanese-ui-readme.yml
          git diff --cached --check
          git commit -m 'docs: document Japanese UI copy verification'
          git push origin HEAD:agent/japanese-ui-copy
