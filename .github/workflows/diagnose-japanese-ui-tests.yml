name: Diagnose Japanese UI tests

on:
  push:
    branches:
      - agent/japanese-ui-copy
    paths:
      - .github/workflows/diagnose-japanese-ui-tests.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/japanese-ui-copy
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        shell: pwsh
        run: npm install --no-audit --no-fund

      - name: Run Vitest with JSON output
        id: vitest
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/diagnostics | Out-Null
          npx vitest run --config vitest.config.ts --reporter=json --outputFile=artifacts/diagnostics/vitest.json
          "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT

      - name: Create concise diagnostic report
        shell: pwsh
        run: |
          @'
          import { readFile, writeFile, mkdir } from 'node:fs/promises';
          const source = JSON.parse(await readFile('artifacts/diagnostics/vitest.json', 'utf8'));
          const lines = [
            '# Japanese UI test diagnostics',
            '',
            `- Commit: ${process.env.GITHUB_SHA}`,
            `- Success: ${Boolean(source.success)}`,
            `- Test files: ${source.numTotalTestSuites ?? 'unknown'}`,
            `- Tests: ${source.numPassedTests ?? 0} passed / ${source.numFailedTests ?? 0} failed`,
            ''
          ];
          const failures = [];
          for (const suite of source.testResults ?? []) {
            for (const assertion of suite.assertionResults ?? []) {
              if (assertion.status !== 'failed') continue;
              failures.push({ suite: suite.name, title: assertion.fullName ?? assertion.title, messages: assertion.failureMessages ?? [] });
            }
          }
          if (failures.length === 0) {
            lines.push('No failing tests.');
          } else {
            lines.push('## Failures', '');
            for (const failure of failures) {
              lines.push(`### ${failure.title}`, '', `- File: \`${failure.suite}\``, '');
              for (const message of failure.messages) {
                const cleaned = String(message)
                  .replace(/\x1b\[[0-9;]*m/g, '')
                  .replace(/D:\\a\\CheckListMaker\\CheckListMaker\\/g, '')
                  .slice(0, 5000);
                lines.push('```text', cleaned, '```', '');
              }
            }
          }
          await mkdir('docs/implementation', { recursive: true });
          await writeFile('docs/implementation/japanese-ui-test-diagnostics.md', `${lines.join('\n')}\n`, 'utf8');
          '@ | Set-Content -LiteralPath artifacts/diagnostics/summarize.mjs -Encoding utf8
          node artifacts/diagnostics/summarize.mjs

      - name: Commit diagnostic report
        shell: pwsh
        run: |
          git config user.name 'checklistmaker-ci'
          git config user.email 'checklistmaker-ci@users.noreply.github.com'
          git add docs/implementation/japanese-ui-test-diagnostics.md
          if (-not (git diff --cached --quiet)) {
            git commit -m 'test: record Japanese UI test diagnostics'
            git push origin HEAD:agent/japanese-ui-copy
          }
