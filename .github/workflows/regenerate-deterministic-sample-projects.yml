name: Regenerate deterministic sample project archives

on:
  push:
    branches:
      - fix/deterministic-sample-project-zips
    paths:
      - .github/workflows/regenerate-deterministic-sample-projects.yml
  pull_request:
    paths:
      - .github/workflows/regenerate-deterministic-sample-projects.yml

permissions:
  contents: write

jobs:
  regenerate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.head_ref == 'fix/deterministic-sample-project-zips')
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/deterministic-sample-project-zips
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: npm install --no-audit --no-fund

      - name: Regenerate projects and manifest
        shell: pwsh
        run: |
          npm run samples:projects:write
          python samples/tools/update_sample_manifest.py --write
          npm run samples:projects:check
          python samples/tools/update_sample_manifest.py --check

      - name: Commit generated samples and cleanup
        shell: pwsh
        run: |
          git config user.name 'checklistmaker-agent'
          git config user.email 'checklistmaker-agent@users.noreply.github.com'
          Remove-Item -LiteralPath '.github/workflows/regenerate-deterministic-sample-projects.yml' -Force
          git add src/main/archive.ts samples .github/workflows/regenerate-deterministic-sample-projects.yml
          git commit -m 'fix: make sample project archives timezone-independent'
          git push origin HEAD:fix/deterministic-sample-project-zips
