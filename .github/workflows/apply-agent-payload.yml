name: Apply agent payload

on:
  push:
    branches:
      - agent/implement-checklistmaker-mvp
    paths:
      - .agent/payload.tar.gz.b64
      - .github/workflows/apply-agent-payload.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply validated payload
        shell: bash
        run: |
          set -euo pipefail
          payload=.agent/payload.tar.gz.b64
          if [[ ! -f "$payload" ]]; then
            echo "No payload present; nothing to apply."
            exit 0
          fi

          archive="$RUNNER_TEMP/checklistmaker-agent-payload.tar.gz"
          base64 --decode "$payload" > "$archive"
          while IFS= read -r entry; do
            case "$entry" in
              /*|../*|*/../*|*\\*)
                echo "Unsafe archive entry: $entry" >&2
                exit 1
                ;;
            esac
          done < <(tar -tzf "$archive")

          tar -xzf "$archive" -C .
          if [[ -f .agent/delete-list.txt ]]; then
            while IFS= read -r target; do
              [[ -z "$target" ]] && continue
              case "$target" in
                /*|../*|*/../*|*\\*)
                  echo "Unsafe delete target: $target" >&2
                  exit 1
                  ;;
              esac
              rm -rf -- "$target"
            done < .agent/delete-list.txt
          fi
          rm -rf .agent

          git config user.name "checklistmaker-agent"
          git config user.email "checklistmaker-agent@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Payload produced no changes."
            exit 0
          fi
          source_message="$(git log -1 --pretty=%B)"
          commit_message="${source_message#agent payload: }"
          git commit -m "$commit_message"
          git push origin HEAD
