name: Electron CI

on:
  push:
    branches:
      - agent/replatform-electron
  pull_request:
    paths:
      - package.json
      - tsconfig*.json
      - vite.config.ts
      - src/**
      - scripts/**
      - tests/**
      - .github/workflows/electron-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        shell: pwsh
        run: npm install --no-audit --no-fund

      - name: Prepare diagnostic directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force artifacts/ci | Out-Null

      - name: Type-check
        shell: pwsh
        run: |
          npm run typecheck 2>&1 | Tee-Object -FilePath artifacts/ci/typecheck.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath artifacts/ci/test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build production application
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath artifacts/ci/build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-ci-logs
          path: artifacts/ci/*.log
          if-no-files-found: ignore
          retention-days: 7
