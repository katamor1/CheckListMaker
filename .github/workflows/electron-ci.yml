name: Electron CI

on:
  push:
    branches:
      - agent/replatform-electron
  pull_request:
    paths:
      - package.json
      - tsconfig*.json
      - vite.config.ts
      - src/**
      - scripts/**
      - samples/**
      - tests/**
      - .github/workflows/electron-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python 3.12 for sample validation
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          npm install --no-audit --no-fund
          python -m pip install --disable-pip-version-check -r samples/tools/requirements.txt

      - name: Prepare diagnostic directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force artifacts/ci | Out-Null

      - name: Type-check
        shell: pwsh
        run: |
          npm run typecheck 2>&1 | Tee-Object -FilePath artifacts/ci/typecheck.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Electron tests
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath artifacts/ci/test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate reusable sample catalog
        shell: pwsh
        run: |
          python -m unittest discover -s tests/sample_catalog -p "test_*.py" -v 2>&1 | Tee-Object -FilePath artifacts/ci/sample-tests.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python samples/validate_samples.py --root . 2>&1 | Tee-Object -FilePath artifacts/ci/sample-validation.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run samples:projects:check 2>&1 | Tee-Object -FilePath artifacts/ci/sample-projects.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build production application
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath artifacts/ci/build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-ci-logs
          path: artifacts/ci/*.log
          if-no-files-found: ignore
          retention-days: 7
