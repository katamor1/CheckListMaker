name: Finalize Japanese UI copy branch

on:
  push:
    branches:
      - agent/japanese-ui-copy
    paths:
      - .github/workflows/finalize-japanese-ui-copy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/japanese-ui-copy
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Remove temporary diagnostic workflows
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item -LiteralPath '.github/workflows/export-japanese-ui-source.yml' -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath '.github/workflows/diagnose-sample-projects.yml' -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath '.github/workflows/finalize-japanese-ui-copy.yml' -Force

      - name: Install dependencies
        shell: pwsh
        run: npm install --no-audit --no-fund

      - name: Run complete automated gate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          npm run typecheck
          npm test
          npm run verify:samples
          npm run build

      - name: Commit finalized branch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'checklistmaker-agent'
          git config user.email 'checklistmaker-agent@users.noreply.github.com'
          git add -A
          if (-not (git diff --cached --quiet)) {
            git commit -m 'chore: remove temporary Japanese UI diagnostics'
            git push origin HEAD:agent/japanese-ui-copy
          }
